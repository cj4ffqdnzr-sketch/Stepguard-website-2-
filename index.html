  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a545b9f1-8f21-46b7-9103-4fad6ab0ce71\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"67601f14-415c-4f6b-8042-53c34bd84b6f\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"5c722495-9ac9-4170-8713-41ec50680d33\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  /* ---------- Tokens ---------- */\n  :root{\n    --bg: #04070c;\n    --bg-2: #070b12;\n    --surface: #0b1119;\n    --surface-2: #0f1722;\n    --line: rgba(255,255,255,.07);\n    --line-strong: rgba(255,255,255,.14);\n    --text: #E8EEF5;\n    --muted: #8493A8;\n    --dim: #5A6776;\n    --steel: #BCC8D6;\n    --accent: #1FA9F5;    /* logo blue */\n    --accent-2: #5BD0FF;  /* highlight */\n    --accent-deep: #0a4d77;\n    --laser: #FF2A2A;\n    --laser-glow: rgba(255,42,42,.6);\n    --ok: #38D38A;\n    --warn: #F5C24D;\n    --hot: #FF6A3D;\n    --maxw: 1280px;\n    --pad: clamp(20px, 4vw, 56px);\n    --display: \"Space Grotesk\", ui-sans-serif, system-ui;\n    --body: \"Manrope\", ui-sans-serif, system-ui;\n    --mono: \"JetBrains Mono\", ui-monospace, monospace;\n  }\n\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--body);font-weight:400;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\n  body{overflow-x:hidden}\n  a{color:inherit;text-decoration:none}\n  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}\n  img{max-width:100%;display:block}\n  ::selection{background:var(--accent);color:#000}\n\n  /* ---------- Atmosphere ---------- */\n  .bg-grid{\n    position:fixed;inset:0;pointer-events:none;z-index:0;\n    background-image:\n      linear-gradient(var(--line) 1px, transparent 1px),\n      linear-gradient(90deg, var(--line) 1px, transparent 1px);\n    background-size: 64px 64px;\n    mask-image: radial-gradient(ellipse at 50% 0%, #000 0%, #000 40%, transparent 75%);\n    -webkit-mask-image: radial-gradient(ellipse at 50% 0%, #000 0%, #000 40%, transparent 75%);\n    opacity:.55;\n  }\n  .bg-glow{\n    position:fixed;inset:0;pointer-events:none;z-index:0;\n    background:\n      radial-gradient(900px 600px at 80% -10%, rgba(31,169,245,.18), transparent 60%),\n      radial-gradient(700px 500px at 0% 30%, rgba(31,169,245,.08), transparent 60%);\n  }\n\n  /* ---------- Language bar ---------- */\n  .langbar{\n    position: sticky; top: 0; z-index: 60;\n    background: #02050a;\n    border-bottom: 1px solid var(--line);\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: .14em;\n    text-transform: uppercase;\n  }\n  .langbar-inner{\n    max-width: var(--maxw); margin: 0 auto;\n    padding: 8px var(--pad);\n    display: flex; align-items: center; justify-content: space-between; gap: 16px;\n  }\n  .langbar-tag{\n    color: var(--dim);\n    display: inline-flex; align-items: center; gap: 8px;\n  }\n  .langbar-tag::before{\n    content: \"\"; width: 5px; height: 5px; border-radius: 50%;\n    background: var(--ok); box-shadow: 0 0 6px var(--ok);\n  }\n  .langbar-pick{ display: inline-flex; gap: 0; align-items: center; border: 1px solid var(--line-strong); border-radius: 999px; padding: 3px; background: rgba(255,255,255,.02); }\n  .langbar-pick button{\n    padding: 4px 12px; border-radius: 999px;\n    color: var(--muted); font-family: var(--mono); font-size: 11px; letter-spacing: .14em;\n    transition: background .2s, color .2s;\n    display: inline-flex; align-items: center; gap: 6px;\n  }\n  .langbar-pick button .flag{ font-size: 13px; line-height: 1; letter-spacing: 0; }\n  .langbar-pick button:hover{ color: var(--text); }\n  .langbar-pick button.on{ background: var(--accent); color: #00111d; }\n  @media (max-width: 560px){\n    .langbar-tag{ display: none; }\n    .langbar-inner{ justify-content: center; }\n  }\n\n  /* ---------- Nav ---------- */\n  .nav{\n    position:sticky;top:33px;z-index:50;\n    backdrop-filter: blur(14px) saturate(140%);\n    -webkit-backdrop-filter: blur(14px) saturate(140%);\n    background: rgba(4,7,12,.65);\n    border-bottom: 1px solid transparent;\n    transition: border-color .25s ease, background .25s ease;\n  }\n  .nav.scrolled{ border-bottom-color: var(--line); background: rgba(4,7,12,.85); }\n  .nav-inner{\n    max-width: var(--maxw); margin:0 auto;\n    display:flex;align-items:center;justify-content:space-between;\n    padding: 14px var(--pad);\n    gap:24px;\n  }\n  .brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:600;letter-spacing:-.01em}\n  .brand img{height:28px;width:auto;object-fit:contain}\n  .brand-mark{\n    height: 32px; width: 32px; border-radius: 8px;\n    background: #000;\n    display:grid;place-items:center;\n    border: 1px solid var(--line);\n    overflow: hidden;\n  }\n  .brand-mark img{height: 100%; width: 100%; object-fit: cover; object-position: 20% center; transfor t\" data-i18n=\"nav_company\">Bedrijf<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"nav-cta\">\n      <a href=\"#contact\" class=\"btn btn-ghost\" data-i18n=\"nav_signin\">Inloggen<\u002Fa>\n      <a href=\"#contact\" class=\"btn btn-primary btn-arrow\" data-i18n=\"nav_demo\">Demo aanvragen&nbsp;<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<section class=\"hero\">\n  <div class=\"wrap\">\n    <div class=\"hero-grid\">\n      <div class=\"hero-copy\">\n        <span class=\"eyebrow\"><span class=\"pulse\"><\u002Fspan><span data-i18n=\"hero_eyebrow\">Voorspellend toezicht voor roltrappen &nbsp;·&nbsp; CE-conforme add-on<\u002Fspan><\u002Fspan>\n        <h1 class=\"display\">\n          <span data-i18n=\"hero_h1_a\">Zie slijtage<\u002Fspan><br>\n          <span class=\"strike\" data-i18n=\"hero_h1_b\">voordat het<\u002Fspan><br>\n          <span class=\"accent\" data-i18n=\"hero_h1_c\">u stopt.<\u002Fspan>\n        <\u002Fh1>\n        <p class=\"lede\" data-i18n=\"hero_lede\" data-i18n-html=\"1\">\n          Stepguard is een AI-vision sensor en asset-managementplatform dat elke trede van een roltrap in real-time bewaakt — slijtage, schade en onveilige situaties worden <em>weken<\u002Fem> voordat een trede faalt gesignaleerd. Gebouwd voor operators die zich geen stilstand kunnen veroorloven.\n        <\u002Fp>\n        <div class=\"hero-ctas\">\n          <a href=\"#contact\" class=\"btn btn-primary btn-arrow\" data-i18n=\"hero_cta_demo\">Boek een demo van 20 min&nbsp;<\u002Fa>\n          <a href=\"#how\" class=\"btn btn-ghost\" data-i18n=\"hero_cta_how\">Hoe het werkt<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"hero-meta\">\n          <div class=\"item\">\n            <div class=\"k\">37.455<\u002Fdiv>\n            <div class=\"l\" data-i18n=\"hero_meta_1\">Actieve roltrappen · Duitsland<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"item\">\n            <div class=\"k\">€80.000<\u002Fdiv>\n            <div class=\"l\" data-i18n=\"hero_meta_2\">Gem. spoedreparatie<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"item\">\n            <div class=\"k\">24 / 7<\u002Fdiv>\n            <div class=\"l\" data-i18n=\"hero_meta_3\">AI-inspectie per trede<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Hero visual: escalator scene -->\n      <div class=\"hero-stage\">\n        <div class=\"label\"><span data-i18n=\"hero_stage_live\">Live · U-Bahn-pilot<\u002Fspan><\u002Fdiv>\n        <div class=\"label-r\" data-i18n=\"hero_stage_cam\">Cam #SG-04-A<\u002Fdiv>\n        <svg class=\"stage-svg\" viewBox=\"0 0 600 600\" preserveAspectRatio=\"xMidYMid slice\" aria-hidden=\"true\">\n          <defs>\n            <linearGradient id=\"stepGrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n              <stop offset=\"0\" stop-color=\"#1a2433\"><\u002Fstop>\n              <stop offset=\"1\" stop-color=\"#0c1320\"><\u002Fstop>\n            <\u002FlinearGradient>\n            <linearGradient id=\"stepEdge\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n              <stop offset=\"0\" stop-color=\"#3a4a60\"><\u002Fstop>\n              <stop offset=\"1\" stop-color=\"#1a2433\"><\u002Fstop>\n            <\u002FlinearGradient>\n            <linearGradient id=\"laserGrad\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n              <stop offset=\"0\" stop-color=\"#FF2A2A\" stop-opacity=\"0\"><\u002Fstop>\n              <stop offset=\".4\" stop-color=\"#FF2A2A\" stop-opacity=\".8\"><\u002Fstop>\n              <stop offset=\"1\" stop-color=\"#FF2A2A\" stop-opacity=\"0\"><\u002Fstop>\n            <\u002FlinearGradient>\n            <radialGradient id=\"lens\" cx=\".4\" cy=\".4\" r=\".7\">\n              <stop offset=\"0\" stop-color=\"#7BD7FF\"><\u002Fstop>\n              <stop offset=\".4\" stop-color=\"#1FA9F5\"><\u002Fstop>\n              <stop offset=\"1\" stop-color=\"#03263d\"><\u002Fstop>\n            <\u002FradialGradient>\n            <filter id=\"laserGlow\" x=\"-50%\" y=\"-50%\" width=\"200%\" height=\"200%\">\n              <feGaussianBlur stdDeviation=\"3\"><\u002FfeGaussianBlur>\n            <\u002Ffilter>\n          <\u002Fdefs>\n\n          <!-- Floor / handrail abstract -->\n          <line x1=\"0\" y1=\"540\" x2=\"600\" y2=\"540\" stroke=\"rgba(255,255,255,.08)\" stroke-width=\"1\"><\u002Fline>\n          <line x1=\"0\" y1=\"60\" x2=\"600\" y2=\"60\" stroke=\"rgba(255,255,255,.05)\" stroke-width=\"1\"><\u002Fline>\n\n          <!-- Escalator handrail line (diagonal) -->\n          <line x1=\"50\" y1=\"500\" x2=\"500\" y2=\"120\" stroke=\"rgba(91,208,255,.25)\" stroke-width=\"1.5\" stroke-dasharray=\"2 6\"><\u002Fline>\n\n          <!-- Steps (staircase) -->\n          <g id=\"steps\" transform=\"translate(40, 80)\">\n            <!-- 12 steps going up-right -->\n          <\u002Fg>\n\n          <!-- Sensor box at base -->\n          <g transform=\"translate(50, 470)\">\n            <rect x=\"-30\" y=\"-30\" width=\"90\" height=\"46\" rx=\"6\" fill=\"#10182a\" stroke=\"#3a4a60\" stroke-width=\"1.2\"><\u002Frect>\n            <rect x=\"-26\" y=\"-26\" width=\"82\" height=\"3\" fill=\"#1FA9F5\" opacity=\".4\"><\u002Frect>\n            <text x=\"-22\" y=\"-12\" font-family=\"JetBrains Mono\" font-size=\"6\" fill=\"#5BD0FF\" letter-spacing=\"1.5\">STEPGUARD · SG-04<\u002Ftext>\n            <!-- IDS Camera lens -->\n            <circle cx=\"38\" cy=\"0\" r=\"13\" fill=\"url(#lens)\"><\u002Fcircle>\n            <circle cx=\"38\" cy=\"0\" r=\"13\" fill=\"none\" stroke=\"#0a3a5e\" stroke-width=\"2\"><\u002Fcircle>\n            <circle cx=\"36\" cy=\"-2\" r=\"3.5\" fill=\"#7BD7FF\" opacity=\".8\"><\u002Fcircle>\n            <!-- Indicator LEDs -->\n            <circle cx=\"-18\" cy=\"8\" r=\"2\" fill=\"#38D38A\"><\u002Fcircle>\n            <circle cx=\"-10\" cy=\"8\" r=\"2\" fill=\"#1FA9F5\"><\u002Fcircle>\n          <\u002Fg>\n\n          <!-- Laser cone -->\n          <g id=\"laser\" opacity=\".95\">\n            <path id=\"laserBeam\" d=\"M 88 470 L 320 250\" stroke=\"url(#laserGrad)\" stroke-width=\"1.4\" filter=\"url(#laserGlow)\"><\u002Fpath>\n            <path d=\"M 88 470 L 320 250\" stroke=\"#FF2A2A\" stroke-width=\".6\" opacity=\".9\"><\u002Fpath>\n            <circle id=\"laserDot\" cx=\"320\" cy=\"250\" r=\"3\" fill=\"#FF2A2A\" filter=\"url(#laserGlow)\"><\u002Fcircle>\n            <circle cx=\"320\" cy=\"250\" r=\"1.5\" fill=\"#fff\"><\u002Fcircle>\n          <\u002Fg>\n\n          <!-- Scan ticks -->\n          <g id=\"scanTicks\" font-family=\"JetBrains Mono\" font-size=\"8\" fill=\"#5BD0FF\" opacity=\".7\"><\u002Fg>\n        <\u002Fsvg>\n\n        <div class=\"hud\">\n          <div>\n            <div class=\"hud-title\" id=\"hudTitle\">Step integrity scan · Level 1<\u002Fdiv>\n            <div class=\"hud-status\"><span class=\"dot\" id=\"hudDot\"><\u002Fspan><span id=\"hudStatus\">Level 1 — All steps nominal · 0 anomalies<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"levels\" id=\"hudLevels\">\n            <div class=\"lv l1 on\" data-lv=\"1\">1<\u002Fdiv>\n            <div class=\"lv l2\" data-lv=\"2\">2<\u002Fdiv>\n            <div class=\"lv l3\" data-lv=\"3\">3<\u002Fdiv>\n            <div class=\"lv l4\" data-lv=\"4\">4<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Ticker -->\n  <div class=\"ticker\" aria-hidden=\"true\">\n    <div class=\"ticker-track\" id=\"ticker\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROBLEM -->\n<section class=\"problem\" id=\"product\">\n  <div class=\"wrap\">\n    <div class=\"quote reveal\">\n      <div>\n        <div class=\"section-eyebrow\" data-i18n=\"prob_eyebrow\">De prijs van een gemiste trede<\u002Fdiv>\n        <h2 class=\"section-title\" data-i18n=\"prob_title\" data-i18n-html=\"1\">Roltrappen falen op het slechtst denkbare moment — en de rekening komt <em>achteraf<\u002Fem>.<\u002Fh2>\n      <\u002Fdiv>\n      <div>\n        <div class=\"news-card\">\n          <div class=\"date\" data-i18n=\"prob_news_date\">12 maart 2026 · Berlijn<\u002Fdiv>\n          <h4 data-i18n=\"prob_news_title\">50+ roltrappen vielen uit op Berlin Hauptbahnhof op één dag.<\u002Fh4>\n          <p data-i18n=\"prob_news_body\">Hoge passagiersstromen, verouderde treden, geen waarschuwing vooraf. Operators in heel Duitsland willen reactieve interventies vervangen door continue monitoring — en de arbeidskosten maken dat onvermijdelijk.<\u002Fp>\n          <div class=\"src\" data-i18n=\"prob_news_src\">Bronnen: rbb24.de · Euronews · ELA Statistical Data 2022<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOW IT WORKS -->\n<section class=\"section\" id=\"how\">\n  <div class=\"wrap\">\n    <div class=\"reveal\">\n      <div class=\"section-eyebrow\" data-i18n=\"how_eyebrow\">Hoe het werkt<\u002Fdiv>\n      <h2 class=\"section-title\" data-i18n=\"how_title\">Vier lagen tussen een versleten trede en een gevallen passagier.<\u002Fh2>\n      <p class=\"section-lede\" data-i18n=\"how_lede\">Eén verzegelde sensorunit, onder de roltrap gemonteerd, bekijkt elke trede die boven hem voorbij komt. Van ruwe beelden tot bruikbare melding in minder dan een seconde — zonder wijzigingen aan de roltrap en zonder verstoring van het bestaande onderhoudscontract.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"grid-4\">\n      <div class=\"feature reveal\">\n        <div class=\"num\">01 · <span data-i18n=\"how_f1_step\">Vastleggen<\u002Fspan> <span class=\"ico\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"3\" y=\"6\" width=\"18\" height=\"13\" rx=\"2\"><\u002Frect><circle cx=\"12\" cy=\"12.5\" r=\"3.5\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fspan><\u002Fdiv>\n        <h3 data-i18n=\"how_f1_title\">Industriële IDS-vision<\u002Fh3>\n        <p data-i18n=\"how_f1_body\">Trillings­bestendige IDS-camera's met low-light prestaties inspecteren elke trede met de snelheid waarmee hij passeert. Verzegelde behuizing onder de roltrap, zonder rail-aanpassingen.<\u002Fp>\n        <div class=\"spec\"><span>GS-class IP65<\u002Fspan><span>30 FPS · 4K<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"feature reveal\">\n        <div class=\"num\">02 · <span data-i18n=\"how_f2_step\">Detecteren<\u002Fspan> <span class=\"ico\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M3 12h3l2-7 4 14 2-7h7\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan><\u002Fdiv>\n        <h3 data-i18n=\"how_f2_title\">AI-vision slijtagemodel<\u002Fh3>\n        <p data-i18n=\"how_f2_body\">Getraind op duizenden uren echte Nederlandse en Duitse roltrap-beelden. Herkent scheuren in treden, randslijtage, plaat-misalignment en losse voorwerpen — over merken en stations heen.<\u002Fp>\n        <div class=\"spec\"><span data-i18n=\"how_f2_s1\">Patent aangevraagd<\u002Fspan><span data-i18n=\"how_f2_s2\">On-prem inferentie<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"feature reveal\">\n        <div class=\"num\">03 · <span data-i18n=\"how_f3_step\">Classificeren<\u002Fspan> <span class=\"ico\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M12 2L2 22h20z\"><\u002Fpath><line x1=\"12\" y1=\"10\" x2=\"12\" y2=\"15\"><\u002Fline><circle cx=\"12\" cy=\"18\" r=\"1\" fill=\"currentColor\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fspan><\u002Fdiv>\n        <h3 data-i18n=\"how_f3_title\">Alarm in vier niveaus<\u002Fh3>\n        <p data-i18n=\"how_f3_body\">Iedere gebeurtenis krijgt een score van een routinemelding tot een stop-de-roltrap-noodgeval. Drempels per locatie, per operator en per dienst instelbaar — vals alarm blijft buiten de wachtrij.<\u002Fp>\n        <div class=\"spec\"><span data-i18n=\"how_f3_s1\">L1-melding → L4-stop<\u002Fspan><span data-i18n=\"how_f3_s2\">Operator-afstelbaar<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"feature reveal\">\n        <div class=\"num\">04 · <span data-i18n=\"how_f4_step\">Beslissen<\u002Fspan> <span class=\"ico\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"16\" rx=\"2\"><\u002Frect><line x1=\"3\" y1=\"9\" x2=\"21\" y2=\"9\"><\u002Fline><\u002Fsvg>\n        <\u002Fspan><\u002Fdiv>\n        <h3 data-i18n=\"how_f4_title\">Asset-platform<\u002Fh3>\n        <p data-i18n=\"how_f4_body\">Een meertalig webplatform toont elke roltrap in uw vloot, met KPI's, monteur-dispatch, exporteerbare EN 115-rapporten en ROI-tracking die uw CFO daadwerkelijk leest.<\u002Fp>\n        <div class=\"spec\"><span>EU-hosted<\u002Fspan><span>GDPR · BDSG<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PLATFORM PREVIEW -->\n<section class=\"platform\" id=\"platform\">\n  <div class=\"wrap\">\n    <div class=\"reveal\">\n      <div class=\"section-eyebrow\" data-i18n=\"pf_eyebrow\">Het Stepguard-platform<\u002Fdiv>\n      <h2 class=\"section-title\" data-i18n=\"pf_title\">Een controleruimte voor iedere roltrap die u beheert.<\u002Fh2>\n      <p class=\"section-lede\" id=\"platform-lede\" data-i18n=\"pf_lede\">Zeven dedicated pagina's — hieronder live ingebed. Klik op een menupunt, wissel de taal, filter alarmen op ernst, open een incident. De knoppen werken echt.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"platform-shell reveal\" id=\"pfShell\">\n      <!-- App top bar -->\n      <div class=\"pf-top\">\n        <a class=\"pf-brand\" href=\"#\"><span class=\"mk\"><img src=\"ad1f5e5a-42a6-48c0-8607-f43a60a33d53\" alt=\"\"><\u002Fspan>step<b>guard<\u002Fb><\u002Fa>\n        <div class=\"pf-crumb\" id=\"pfCrumb\">Betrieb · <b>Dashboard<\u002Fb><\u002Fdiv>\n        <div class=\"pf-search\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><line x1=\"16.5\" y1=\"16.5\" x2=\"21\" y2=\"21\"><\u002Fline><\u002Fsvg>\n          <input id=\"pfSearch\" placeholder=\"Suchen — Stationen, Eskalatoren …\">\n        <\u002Fdiv>\n        <div class=\"pf-lang\" id=\"pfLang\">\n          <button data-l=\"de\" class=\"on\">DE<\u002Fbutton>\n          <button data-l=\"en\">EN<\u002Fbutton>\n          <button data-l=\"nl\">NL<\u002Fbutton>\n        <\u002Fdiv>\n        <button class=\"pf-bell\" id=\"pfBell\" aria-label=\"Notifications\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 8a6 6 0 1 1 12 0c0 7 3 9 3 9H3s3-2 3-9z\"><\u002Fpath><path d=\"M10 21a2 2 0 0 0 4 0\"><\u002Fpath><\u002Fsvg>\n          <span class=\"count\">3<\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"pf-avatar\" title=\"Rem van der Heijden\">RH<\u002Fdiv>\n        <div class=\"notif-pop\" id=\"pfNotif\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"pf-body\">\n        <aside class=\"pf-side\" id=\"pfSide\"><!-- nav injected --><\u002Faside>\n        <div class=\"pf-main\" id=\"pfMain\"><!-- page content --><\u002Fdiv>\n\n        <!-- detail drawer overlays the body grid -->\n        <div class=\"drawer-bg\" id=\"pfDrawerBg\"><\u002Fdiv>\n        <div class=\"drawer\" id=\"pfDrawer\" role=\"dialog\" aria-label=\"Detail\"><\u002Fdiv>\n\n        <!-- toast -->\n        <div class=\"toast\" id=\"pfToast\"><span class=\"dot\"><\u002Fspan><span id=\"pfToastMsg\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- INDUSTRIES -->\n<section class=\"industries\" id=\"industries\">\n  <div class=\"wrap\">\n    <div class=\"reveal\">\n      <div class=\"section-eyebrow\" data-i18n=\"ind_eyebrow\">Gebouwd voor<\u002Fdiv>\n      <h2 class=\"section-title\" data-i18n=\"ind_title\">Waar één stilstaande roltrap een meetbaar probleem is.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"industry-grid\">\n      <div class=\"ind-card reveal\">\n        <div class=\"top\">\n          <span class=\"num\">01<\u002Fspan>\n          <svg class=\"ill\" viewBox=\"0 0 80 80\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" aria-hidden=\"true\">\n            <path d=\"M10 60 L40 25 L70 60\"><\u002Fpath>\n            <path d=\"M14 60 H66\"><\u002Fpath>\n            <circle cx=\"40\" cy=\"55\" r=\"2.5\" fill=\"currentColor\"><\u002Fcircle>\n            <path d=\"M22 60 V52 H58 V60\"><\u002Fpath>\n            <line x1=\"28\" y1=\"52\" x2=\"28\" y2=\"42\" stroke-dasharray=\"2 3\"><\u002Fline>\n            <line x1=\"52\" y1=\"52\" x2=\"52\" y2=\"42\" stroke-dasharray=\"2 3\"><\u002Fline>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <h4 data-i18n=\"ind_1_h\">Openbaar vervoer<\u002Fh4>\n          <p class=\"desc\" data-i18n=\"ind_1_p\">MVG, BVG, FVG, Deutsche Bahn, NS. Netwerken die honderden roltrappen onder continue belasting draaien. Alleen MVG beheert er 772.<\u002Fp>\n          <div class=\"tag\" data-i18n=\"ind_1_t\">→ Ankersegment<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ind-card reveal\">\n        <div class=\"top\">\n          <span class=\"num\">02<\u002Fspan>\n          <svg class=\"ill\" viewBox=\"0 0 80 80\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" aria-hidden=\"true\">\n            <path d=\"M10 50 H70 L60 35 L50 50 M50 50 L40 30 L30 50\"><\u002Fpath>\n            <line x1=\"10\" y1=\"60\" x2=\"70\" y2=\"60\"><\u002Fline>\n            <circle cx=\"40\" cy=\"22\" r=\"2\" fill=\"currentColor\"><\u002Fcircle>\n            <line x1=\"40\" y1=\"22\" x2=\"40\" y2=\"14\"><\u002Fline>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <h4 data-i18n=\"ind_2_h\">Luchthavens<\u002Fh4>\n          <p class=\"desc\" data-i18n=\"ind_2_p\">Duitsland telt 32 commerciële luchthavens. Frankfurt, Düsseldorf en Berlijn verwerken dagelijks miljoenen passagiers via roltrap-afhankelijke stromen.<\u002Fp>\n          <div class=\"tag\" data-i18n=\"ind_2_t\">→ Hoge beschikbaarheid<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ind-card reveal\">\n        <div class=\"top\">\n          <span class=\"num\">03<\u002Fspan>\n          <svg class=\"ill\" viewBox=\"0 0 80 80\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" aria-hidden=\"true\">\n            <rect x=\"14\" y=\"22\" width=\"52\" height=\"36\" rx=\"2\"><\u002Frect>\n            <line x1=\"14\" y1=\"34\" x2=\"66\" y2=\"34\"><\u002Fline>\n            <line x1=\"14\" y1=\"46\" x2=\"66\" y2=\"46\"><\u002Fline>\n            <line x1=\"30\" y1=\"22\" x2=\"30\" y2=\"58\"><\u002Fline>\n            <line x1=\"50\" y1=\"22\" x2=\"50\" y2=\"58\"><\u002Fline>\n            <path d=\"M40 14 L40 22 M34 18 L46 18\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <h4 data-i18n=\"ind_3_h\">Winkelcentra<\u002Fh4>\n          <p class=\"desc\" data-i18n=\"ind_3_p\">ECE Group, Duitslands grootste centrum-operator. IKEA, Galeria Kaufhof. Bezoekersstromen zijn direct gekoppeld aan omzet per vierkante meter.<\u002Fp>\n          <div class=\"tag\" data-i18n=\"ind_3_t\">→ Omzetbescherming<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ind-card reveal\">\n        <div class=\"top\">\n          <span class=\"num\">04<\u002Fspan>\n          <svg class=\"ill\" viewBox=\"0 0 80 80\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" aria-hidden=\"true\">\n            <ellipse cx=\"40\" cy=\"42\" rx=\"32\" ry=\"18\"><\u002Fellipse>\n            <ellipse cx=\"40\" cy=\"42\" rx=\"22\" ry=\"12\"><\u002Fellipse>\n            <ellipse cx=\"40\" cy=\"42\" rx=\"12\" ry=\"6\"><\u002Fellipse>\n            <line x1=\"8\" y1=\"42\" x2=\"72\" y2=\"42\" stroke-dasharray=\"2 3\"><\u002Fline>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <h4 data-i18n=\"ind_4_h\">Stadions &amp; venues<\u002Fh4>\n          <p class=\"desc\" data-i18n=\"ind_4_p\">Messe Berlin, München, Frankfurt. Geconcentreerde uitstroommomenten — als 40.000 mensen tegelijk naar buiten gaan, wordt een stilstaande roltrap een veiligheids­incident.<\u002Fp>\n          <div class=\"tag\" data-i18n=\"ind_4_t\">→ Crowd flow<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ROI -->\n<section class=\"roi\">\n  <div class=\"wrap\">\n    <div class=\"roi-grid\">\n      <div class=\"reveal\">\n        <div class=\"section-eyebrow\" data-i18n=\"roi_eyebrow\">De economische kant<\u002Fdiv>\n        <h2 class=\"section-title\" data-i18n=\"roi_title\">Terugverdiend vanaf de eerste voorkomen storing.<\u002Fh2>\n        <p class=\"section-lede\" data-i18n=\"roi_lede\" data-i18n-html=\"1\">Een spoedvervanging van een trede kost tot <strong style=\"color:var(--text)\">€80.000<\u002Fstrong> aan materiaal alleen — exclusief stilstand, gederfde ticketinkomsten, monteur-overuren of SLA-boetes. Stepguard pikt het slijtagepatroon weken eerder op en maakt er een geplande klus overdag van.<\u002Fp>\n        <div style=\"margin-top:32px; display:flex; gap:14px; flex-wrap: wrap;\">\n          <a href=\"#contact\" class=\"btn btn-primary btn-arrow\" data-i18n=\"roi_cta_1\">Bereken uw ROI&nbsp;<\u002Fa>\n          <a href=\"#compliance\" class=\"btn btn-ghost\" data-i18n=\"roi_cta_2\">Compliance-brief bekijken<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"compare reveal\">\n        <div class=\"col good\">\n          <div class=\"tag\" data-i18n=\"roi_good_tag\">Met Stepguard<\u002Fdiv>\n          <div class=\"price\">€20–30k<\u002Fdiv>\n          <div class=\"sub\" data-i18n=\"roi_good_sub\" data-i18n-html=\"1\">Eenmalig per roltrap<br>+ €1.000 /  k;\n    return (SITE_I18N[lang] && SITE_I18N[lang][k]) || SITE_NL_SNAPSHOT[k] || k;\n  };\n\n  // Wire up pills + restore from localStorage\n  snapshotNL();\n  document.querySelectorAll('#siteLang button').forEach(b => {\n    b.addEventListener('click', () => applyLang(b.dataset.lang));\n  });\n  let savedLang = 'nl';\n  try { savedLang = localStorage.getItem('sg_site_lang') || 'nl'; } catch(_){}\n  if (savedLang !== 'nl') applyLang(savedLang);\n\n  // ---- Nav scroll state ----\n  const nav = document.getElementById('nav');\n  window.addEventListener('scroll', () => {\n    nav.classList.toggle('scrolled', window.scrollY > 8);\n  }, { passive: true });\n\n  // ---- Build steps in hero SVG ----\n  (function buildSteps(){\n    const g = document.getElementById('steps');\n    if (!g) return;\n    // We draw 11 steps going diagonally up-right\n    // Origin (40, 80) in svg, so place steps starting from bottom-left\n    const stepCount = 11;\n    const baseX = 10, baseY = 380; // bottom of staircase area (relative to translate)\n    const stepW = 46, stepH = 12, dx = 38, dy = -34;\n    for (let i = 0; i < stepCount; i++){\n      const x = baseX + i * dx;\n      const y = baseY + i * dy;\n      // step polygon (top + side face)\n      const poly = document.createElementNS('http://www.w3.org/2000/svg', 'path');\n      const d = `M ${x} ${y} L ${x+stepW} ${y} L ${x+stepW} ${y+stepH} L ${x} ${y+stepH} Z`;\n      poly.setAttribute('d', d);\n      poly.setAttribute('fill', 'url(#stepGrad)');\n      poly.setAttribute('stroke', 'url(#stepEdge)');\n      poly.setAttribute('stroke-width', '.8');\n      g.appendChild(poly);\n\n      // riser\n      const riser = document.createElementNS('http://www.w3.org/2000/svg', 'path');\n      riser.setAttribute('d', `M ${x+stepW} ${y} L ${x+stepW+dx*.18} ${y - 12}`);\n      riser.setAttribute('stroke', 'rgba(123,215,255,.18)');\n      riser.setAttribute('stroke-width', '1');\n      g.appendChild(riser);\n\n      // step number tick\n      const tx = document.createElementNS('http://www.w3.org/2000/svg', 'text');\n      tx.setAttribute('x', x+2); tx.setAttribute('y', y-2);\n      tx.setAttribute('font-family', 'JetBrains Mono');\n      tx.setAttribute('font-size', '6');\n      tx.setAttribute('fill', 'rgba(123,215,255,.4)');\n      tx.setAttribute('letter-spacing', '0.5');\n      tx.setAttribute('data-step-label', String(14 - i));\n      tx.textContent = String(14 - i).padStart(2,'0');\n      g.appendChild(tx);\n\n      // wear marker placeholder — driven by scene cycler\n      const wear = document.createElementNS('http://www.w3.org/2000/svg', 'rect');\n      wear.setAttribute('x', x + 18); wear.setAttribute('y', y + 2);\n      wear.setAttribute('width', 18); wear.setAttribute('height', 7);\n      wear.setAttribute('rx', '1');\n      wear.setAttribute('data-wear-for', String(14 - i));\n      wear.setAttribute('opacity', '0');\n      wear.setAttribute('fill', '#F5C24D');\n      g.appendChild(wear);\n    }\n  })();\n\n  // ---- Laser sweep animation ----\n  (function laser(){\n    const beam = document.getElementById('laserBeam');\n    const dot = document.getElementById('laserDot');\n    if (!beam) return;\n    // Steps centers along diagonal — approximate target points\n    const targets = [];\n    for (let i = 0; i < 11; i++){\n      // Same math as buildSteps but in svg coordinates with translate(40,80)\n      const x = 40 + 10 + i * 38 + 23;\n      const y = 80 + 380 + i * -34 + 6;\n      targets.push([x,y]);\n    }\n    let idx = 0;\n    let t = 0;\n    function tick(){\n      t += 0.012;\n      if (t >= 1){\n        t = 0;\n        idx = (idx + 1) % targets.length;\n      }\n      const from = targets[idx];\n      const to = targets[(idx + 1) % targets.length];\n      const x = from[0] + (to[0] - from[0]) * t;\n      const y = from[1] + (to[1] - from[1]) * t;\n      const ox = 88, oy = 470;\n      beam?.setAttribute('d', `M ${ox} ${oy} L ${x} ${y}`);\n      const path2 = beam.nextElementSibling;\n      path2?.setAttribute('d', `M ${ox} ${oy} L ${x} ${y}`);\n      dot?.setAttribute('cx', x);\n      dot?.setAttribute('cy', y);\n      dot?.nextElementSibling?.setAttribute('cx', x);\n      dot?.nextElementSibling?.setAttribute('cy', y);\n      requestAnimationFrame(tick);\n    }\n    tick();\n  })();\n\n  // ---- Hero pilot scene cycler (cycles Level 1 → 2 → 3) ----\n  (function pilotScenes(){\n    const hud = document.querySelector('.hero-stage .hud');\n    const title = document.getElementById('hudTitle');\n    const status = document.getElementById('hudStatus');\n    const levels = document.getElementById('hudLevels');\n    const stepsG = document.getElementById('steps');\n    if (!hud || !title || !status || !levels || !stepsG) return;\n\n    const wearRects = stepsG.querySelectorAll('rect[data-wear-for]');\n    const stepLabels = stepsG.querySelectorAll('text[data-step-label]');\n\n    // Scenes describe: HUD title/status, level pip, and wear markers per step\n    // Text comes from i18n keys (set by language switcher)\n    const scenes = [\n      {\n        level: 1,\n        titleKey: 'hud_t1',\n        statusKey: 'hud_s1',\n        wear: {},\n        highlightSteps: []\n      },\n      {\n        level: 2,\n        titleKey: 'hud_t2',\n        statusKey: 'hud_s2',\n        wear: { 9: { fill: '#F5C24D', opacity: .65 } },\n        highlightSteps: [9]\n      },\n      {\n        level: 3,\n        titleKey: 'hud_t3',\n        statusKey: 'hud_s3',\n        wear: {\n          9:  { fill: '#FF6A3D', opacity: .85, w: 22 },\n          11: { fill: '#FF6A3D', opacity: .7,  w: 14 }\n        },\n        highlightSteps: [9, 11]\n      }\n    ];\n\n    let i = 0;\n    function apply(scene){\n      hud.setAttribute('data-level', scene.level);\n      const ti = (window.__i18n_t || ((k)=>k));\n      title.textContent = ti(scene.titleKey);\n      status.textContent = ti(scene.statusKey);\n      // remember keys so the language switcher can re-translate on the fly\n      t  l${a.level}\">${a.level}<\u002Fdiv>\n                <div class=\"meta\">\n                  <div class=\"title\">${a.title}<\u002Fdiv>\n                  <div class=\"sub\">${a.where} · ${a.op} · ${a.unit}<\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"time\">${a.time}<\u002Fdiv>\n                <div class=\"arrow\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"9 18 15 12 9 6\"/><\u002Fsvg><\u002Fdiv>\n              <\u002Fdiv>`).join('')}\n            ${filtered.length === 0 ? '<div style=\"padding:40px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px\">Keine Alarme auf dieser Stufe.<\u002Fdiv>' : ''}\n          <\u002Fdiv>`;\n      },\n\n      impact(){\n        return `\n          <div class=\"pf-page-head\">\n            <div><h4>${t('title_impact')}<\u002Fh4><div class=\"sub\">${t('sub_impact')}<\u002Fdiv><\u002Fdiv>\n            <div class=\"actions\">\n              <button class=\"btnx\" data-act=\"export-csv\">CSV<\u002Fbutton>\n              <button class=\"btnx primary\" data-act=\"export\">${t('export')}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"kpis\">\n            <div class=\"kpi\"><div class=\"l\">Eingesparte Wartung<\u002Fdiv><div class=\"v\">€ 412k<\u002Fdiv><div class=\"d\">vs. reaktive Basis<\u002Fdiv><\u002Fdiv>\n            <div class=\"kpi\"><div class=\"l\">Verhinderte Stufenwechsel<\u002Fdiv><div class=\"v\">68<\u002Fdiv><div class=\"d\">≈ 15 t Aluminium<\u002Fdiv><\u002Fdiv>\n            <div class=\"kpi\"><div class=\"l\">CO₂ vermieden<\u002Fdiv><div class=\"v\">15.1 t<\u002Fdiv><div class=\"d\">222 kg / Stufe<\u002Fdiv><\u002Fdiv>\n            <div class=\"kpi\"><div class=\"l\">SDG-Beitrag<\u002Fdiv><div class=\"v\">9·11·12·13<\u002Fdiv><div class=\"d\">NCES-konform<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"pf-row evens\">\n            <div class=\"pf-panel\">\n              <h5>Monatliche Einsparungen · 2026<\u002Fh5>\n              <div class=\"sub\">EUR · operativer Aufwand vermieden<\u002Fdiv>\n              <div class=\"bars\">\n                <div class=\"bar\" style=\"height:48%\"><\u002Fdiv>\n                <div class=\"bar\" style=\"height:62%\"><\u002Fdiv>\n                <div class=\"bar\" style=\"height:74%\"><\u002Fdiv>\n                <div class=\"bar\" style=\"height:71%\"><\u002Fdiv>\n                <div class=\"bar\" style=\"height:85%\"><\u002Fdiv>\n                <div class=\"bar dim\" style=\"height:55%\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"bars-x\"><span>JAN<\u002Fspan><span>FEB<\u002Fspan><span>MRZ<\u002Fspan><span>APR<\u002Fspan><span>MAI<\u002Fspan><span>JUN<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"pf-panel\">\n              <h5>SDG-Ausrichtung<\u002Fh5>\n              <div class=\"sub\">UN Sustainable Development Goals<\u002Fdiv>\n              <div class=\"sdg-grid\">\n                <div class=\"sdg\">09<\u002Fdiv><div class=\"sdg\">11<\u002Fdiv><div class=\"sdg\">12<\u002Fdiv><div class=\"sdg\">13<\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"font-size:12px;color:var(--steel);margin-top:14px;line-height:1.5\">Industry &amp; infrastructure · Sustainable cities · Responsible consumption · Climate action<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>`;\n      },\n\n      updates(){\n        return `\n          <div class=\"pf-page-head\">\n            <div><h4>${t('title_updates')}<\u002Fh4><div class=\"sub\">${t('sub_updates')}<\u002Fdiv><\u002Fdiv>\n            <div class=\"actions\"><button class=\"btnx\" data-act=\"refresh\">${t('refresh')}<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"timeline\">\n            ${updates.map(u => `\n              <div class=\"tl-item ${u.kind}\" data-upd=\"${u.kind}\">\n                <div class=\"when\">${u.when} · ${u.kind === 'firmware' ? 'Firmware' : u.kind === 'ai' ? 'AI-Modell' : u.kind === 'calib' ? 'Kalibrierung' : 'Vorfall'}<\u002Fdiv>\n                <div class=\"what\">${u.what}<\u002Fdiv>\n                <div class=\"where\">${u.loc}<\u002Fdiv>\n              <\u002Fdiv>`).join('')}\n          <\u002Fdiv>`;\n      },\n\n      settings(){\n        return `\n          <div class=\"pf-page-head\">\n            <div><h4>${t('title_settings')}<\u002Fh4><div class=\"sub\">${t('sub_settings')}<\u002Fdiv><\u002Fdiv>\n            <div class=\"actions\"><button class=\"btnx primary\" data-act=\"save\">Speichern<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"settings\">\n            <div class=\"setting\">\n              <div class=\"srow\">\n                <div><label>Schnittstellen-Sprache<\u002Flabel><div class=\"desc\">Plattform-Oberfläche und automatische E-Mails. Berichte werden separat exportiert.<\u002Fdiv><\u002Fdiv>\n                <div class=\"lang-pick\">\n                  <button class=\"${state.lang === 'de' ? 'on' : ''}\" data-l=\"de\">DE<\u002Fbutton>\n                  <button class=\"${state.lang === 'en' ? 'on' : ''}\" data-l=\"en\">EN<\u002Fbutton>\n                  <button class=\"${state.lang === 'nl' ? 'on' : ''}\" data-l=\"nl\">NL<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"setting\">\n              <div class=\"srow\">\n                <div><label>Automatische Abschaltung bei L4<\u002Flabel><div class=\"desc\">Stoppt den Eskalator automatisch bei Erkennung eines kritischen Defekts. EU-AI-Act-konform: menschliche Aufsicht bleibt erforderlich.<\u002Fdiv><\u002Fdiv>\n                <button class=\"toggle ${state.toggles.autoStop ? 'on' : ''}\" data-tg=\"autoStop\" aria-label=\"autostop\"><\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"setting\">\n              <div class=\"srow\">\n                <div><label>GDPR / BDSG · EU-Datenresidenz<\u002Flabel><div class=\"desc\">Alle Daten verbleiben auf EU-Servern. Anonymisierung von Personen im Kamerafeld aktiv.<\u002Fdiv><\u002Fdiv>\n                <button class=\"toggle ${state.toggles.gdpr ? 'on' : ''}\" data-tg=\"gdpr\" aria-label=\"gdpr\"><\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"setting\">\n              <div class=\"srow\">\n                <div><label>E-Mail-Benachrichtigungen<\u002Flabel><div class=\"desc\">Tägliche Zusammenfassung um 07:00 Uhr · Sofort-Benachrichtigung ab L3.<\u002Fdiv><\u002Fdiv>\n                <button class=\"toggle ${state.toggles.email ? 'on' : ''}\" data-tg=\"email\" aria-label=\"email\"><\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"setting\">\n              <div class=\"srow\">\n                <div><label>Edge-AI · Inferenz vor Ort<\u002Flabel><div class=\"desc\">AI läuft auf der Sensorbox. Keine Videodaten verlassen den Standort.<\u002Fdiv><\u002Fdiv>\n                <button class=\"toggle ${state.toggles.edgeAi ? 'on' : ''}\" data-tg=\"edgeAi\" aria-label=\"edge\"><\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"setting\">\n              <label>Schwellenwert · Trittflächenabnutzung<\u002Flabel>\n              <div class=\"desc\">L2-Warnung ab diesem Abnutzungs-Score. Standard: 60.<\u002Fdiv>\n              <div class=\"slider-row\">\n                <input type=\"range\" min=\"20\" max=\"95\" value=\"${state.thresholds.wear}\" data-sl=\"wear\"/>\n                <div class=\"val\" id=\"valWear\">${state.thresholds.wear}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"setting\">\n              <label>Schwellenwert · Kritischer Defekt<\u002Flabel>\n              <div class=\"desc\">L4-Auto-Abschaltung ab diesem Abnutzungs-Score. Standard: 85.<\u002Fdiv>\n              <div class=\"slider-row\">\n                <input type=\"range\" min=\"60\" max=\"100\" value=\"${state.thresholds.critical}\" data-sl=\"critical\"/>\n                <div class=\"val\" id=\"valCritical\">${state.thresholds.critical}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>`;\n      },\n    };\n\n    // ---- Render & wire up ----\n    function setPage(p){ state.page = p; state.notifOpen = false; $notif.classList.remove('on'); closeDrawer(); render(); }\n    function setLang(l){ state.lang = l; toast(t('toast_lang')); render(); }\n    function setFilter(f){ state.alarmFilter = f; render(); }\n\n    function attachPageHandlers(){\n      $main.querySelectorAll('[data-alarm]').forEach(el => el.addEventListener('click', () => openAlarm(el.dataset.alarm)));\n      $main.querySelectorAll('[data-loc]').forEach(el => el.addEventListener('click', () => openLoc(el.dataset.loc)));\n      $main.querySelectorAll('[data-cust]').forEach(el => el.addEventListener('click', () => toast('Kundendetails öffnen — ' + el.dataset.cust)));\n      $main.querySelectorAll('[data-filter]').forEach(el => el.addEventListener('click', () => setFilter(el.dataset.filter)));\n      $main.querySelectorAll('[data-upd]').forEach(el => el.addEventListener('click', () => toast('Update-Details: ' + el.dataset.upd)));\n      $main.querySelectorAll('[data-kpi]').forEach(el => el.addEventListener('click', () => {\n        const map = { units:'locations', uptime:'dashboard', alarms:'alarms', saved:'impact' };\n        if (map[el.dataset.kpi] && map[el.dataset.kpi] !== state.page) setPage(map[el.dataset.kpi]);\n      }));\n      $main.querySelectorAll('[data-act]').forEach(el => el.addEventListener('click', (e) => {\n        e.stopPropagation();\n        const a = el.dataset.act;\n        if (a === 'refresh') toast(t('toast_refresh'));\n        if (a === 'export' || a === 'export-csv') toast(t('toast_export'));\n        if (a === 'save') toast(t('toast_save'));\n        if (a === 'new-pilot') toast('+ Neuer Pilot · Formular geöffnet');\n        if (a === 'locations-page') setPage('locations');\n        if (a === 'alarms-page') setPage('alarms');\n      }));\n      // Settings interactions\n      $main.querySelectorAll('.lang-pick button').forEach(b => b.addEventListener('click', () => setLang(b.dataset.l)));\n      $main.querySelectorAll('.toggle').forEach(t => t.addEventListener('click', () => {\n        const k = t.dataset.tg;\n        state.toggles[k] = !state.toggles[k];\n        t.classList.toggle('on', state.toggles[k]);\n      }));\n      $main.querySelectorAll('input[type=range]').forEach(s => s.addEventListener('input', (e) => {\n        const k = s.dataset.sl;\n        state.thresholds[k] = parseInt(e.target.value);\n        const v = $main.querySelector('#val' + k.charAt(0).toUpperCase() + k.slice(1));\n        if (v) v.textContent = state.thresholds[k];\n      }));\n    }\n\n    function render(){\n      renderSide();\n      renderTop();\n      $main.innerHTML = pages[state.page]();\n      attachPageHandlers();\n    }\n\n    // ---- Top bar handlers ----\n    $lang.querySelectorAll('button').forEach(b => b.addEventListener('click', () => setLang(b.dataset.l)));\n    $bell.addEventListener('click', (e) => {\n      e.stopPropagation();\n      state.notifOpen = !state.notifOpen;\n      $notif.classList.toggle('on', state.notifOpen);\n    });\n    document.addEventListener('click', (e) => {\n      if (state.notifOpen && !$bell.contains(e.target) && !$notif.contains(e.target)){\n        state.notifOpen = false; $notif.classList.remove('on');\n      }\n    });\n    $search.addEventListener('input', (e) => {\n      state.locationSearch = e.target.value;\n      if (state.page === 'locations') render();\n      else if (e.target.value && state.page !== 'locations') setPage('locations');\n    });\n    $drawerBg.addEventListener('click', closeDrawer);\n    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });\n\n    render();\n  })();\n\n  // ---- Reveal on scroll ----\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target);} });\n  }, { threshold: .08, rootMargin: '0px 0px -60px 0px' });\n  document.querySelectorAll('.reveal').forEach(el => io.observe(el));\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
